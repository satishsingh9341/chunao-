steps:
  # 1. Install & Build Frontend
  - name: 'node:20'
    dir: 'frontend'
    entrypoint: 'npm'
    args: ['install']
  - name: 'node:20'
    dir: 'frontend'
    entrypoint: 'npm'
    args: ['run', 'build']

  # 2. Install & Test Backend
  - name: 'node:20'
    dir: 'backend'
    entrypoint: 'npm'
    args: ['install']
  - name: 'node:20'
    dir: 'backend'
    entrypoint: 'npm'
    env: ['NODE_ENV=test']
    args: ['test', '--passWithNoTests']

  # 3. Build Docker Images
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'asia.gcr.io/$PROJECT_ID/chunao-frontend:$BUILD_ID', './frontend']
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'asia.gcr.io/$PROJECT_ID/chunao-backend:$BUILD_ID', './backend']

  # 4. Push Docker Images
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'asia.gcr.io/$PROJECT_ID/chunao-frontend:$BUILD_ID']
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'asia.gcr.io/$PROJECT_ID/chunao-backend:$BUILD_ID']

  # 5. Deploy Backend to Cloud Run (asia-south1)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - chunao-saathi-backend
      - --image=asia.gcr.io/$PROJECT_ID/chunao-backend:$BUILD_ID
      - --region=asia-south1
      - --platform=managed
      - --allow-unauthenticated
      - --set-env-vars=FIREBASE_PROJECT_ID=$PROJECT_ID,GOOGLE_CLOUD_PROJECT=$PROJECT_ID,NODE_ENV=production,GCS_BUCKET=chunao-saathi-storage-2026
      - --memory=512Mi

  # 6. Deploy Frontend to Firebase Hosting
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: bash
    args:
      - '-c'
      - |
        npm install -g firebase-tools
        firebase deploy --only hosting --project $PROJECT_ID --token $$FIREBASE_TOKEN
    secretEnv: ['FIREBASE_TOKEN']

availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/FIREBASE_TOKEN/versions/latest
      env: 'FIREBASE_TOKEN'

images:
  - 'asia.gcr.io/$PROJECT_ID/chunao-frontend:$BUILD_ID'
  - 'asia.gcr.io/$PROJECT_ID/chunao-backend:$BUILD_ID'

timeout: '1200s'
