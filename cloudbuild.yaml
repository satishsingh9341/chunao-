steps:
  # Install and test frontend
  - name: 'gcr.io/cloud-builders/npm'
    dir: 'frontend'
    args: ['install', '--legacy-peer-deps']

  - name: 'gcr.io/cloud-builders/npm'
    dir: 'frontend'
    args: ['run', 'build']

  # Install and test backend
  - name: 'gcr.io/cloud-builders/npm'
    dir: 'backend'
    args: ['install']

  - name: 'gcr.io/cloud-builders/npm'
    dir: 'backend'
    args: ['test', '--passWithNoTests']
    env:
      - 'NODE_ENV=test'

  # Build Docker images
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/chunao-frontend:$COMMIT_SHA', './frontend']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/chunao-backend:$COMMIT_SHA', './backend']

  # Push images
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/chunao-frontend:$COMMIT_SHA']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/chunao-backend:$COMMIT_SHA']

  # Deploy backend to Cloud Run
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'chunao-saathi-backend'
      - '--image=gcr.io/$PROJECT_ID/chunao-backend:$COMMIT_SHA'
      - '--region=asia-south1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--port=8080'

  # Deploy frontend to Cloud Run
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'chunao-saathi-frontend'
      - '--image=gcr.io/$PROJECT_ID/chunao-frontend:$COMMIT_SHA'
      - '--region=asia-south1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--port=8080'

images:
  - 'gcr.io/$PROJECT_ID/chunao-frontend:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/chunao-backend:$COMMIT_SHA'

options:
  logging: CLOUD_LOGGING_ONLY
